<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praxant — Hidden Ant Network (color)">
  <!-- Antennae -->
  <g fill="none" stroke="#1A2B4A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="47,21 43,15 39,12"/>
    <polyline points="53,21 57,15 61,12"/>
  </g>
  <!-- Petioles -->
  <g fill="none" stroke="#1A2B4A" stroke-width="1.4" stroke-linecap="round">
    <line x1="50" y1="29" x2="50" y2="36"/>
    <line x1="50" y1="48" x2="50" y2="58"/>
  </g>
  <!-- Legs (jointed) -->
  <g fill="none" stroke="#1A2B4A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="46,39 39,34 32,36"/>
    <polyline points="46,43 33,44 24,49"/>
    <polyline points="46,47 38,53 30,58"/>
    <polyline points="54,39 61,34 68,36"/>
    <polyline points="54,43 67,44 76,49"/>
    <polyline points="54,47 62,53 70,58"/>
  </g>
  <!-- Head + thorax -->
  <g fill="#1A2B4A">
    <circle cx="50" cy="25" r="3.8"/>
    <circle cx="50" cy="42" r="5.2"/>
  </g>
  <!-- Abdomen (focal accent) -->
  <circle cx="50" cy="68" r="8" fill="#B45309"/>
</svg>
