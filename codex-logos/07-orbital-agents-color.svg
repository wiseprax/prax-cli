<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praxant — Orbital Agents (color)">
  <!-- Concentric orbit rings -->
  <g fill="none" stroke="#1A2B4A" stroke-width="1" opacity="0.3">
    <circle cx="50" cy="50" r="15"/>
    <circle cx="50" cy="50" r="25"/>
    <circle cx="50" cy="50" r="35"/>
  </g>
  <!-- Worker dots on orbits -->
  <g fill="#1A2B4A">
    <circle cx="60.6" cy="39.4" r="3.5"/>
    <circle cx="26.5" cy="41.5" r="3.5"/>
    <circle cx="38" cy="82.9" r="3.5"/>
    <circle cx="80.3" cy="32.5" r="3.5"/>
  </g>
  <!-- Central orchestrator (focal accent) -->
  <circle cx="50" cy="50" r="5" fill="#B45309"/>
</svg>
