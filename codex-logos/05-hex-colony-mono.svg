<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praxant — Hex Colony (monochrome)">
  <!-- Reusable hex (circumradius 8) -->
  <defs>
    <polygon id="hex" points="0,-8 6.93,-4 6.93,4 0,8 -6.93,4 -6.93,-4"/>
  </defs>
  <!-- Outlined colony cells -->
  <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
    <use href="#hex" x="50" y="50"/>
    <use href="#hex" x="65" y="50"/>
    <use href="#hex" x="42.5" y="37"/>
    <use href="#hex" x="35" y="50"/>
    <use href="#hex" x="42.5" y="63"/>
    <use href="#hex" x="57.5" y="63"/>
  </g>
  <!-- Queen cell (focal) -->
  <use href="#hex" x="57.5" y="37" fill="currentColor"/>
</svg>
