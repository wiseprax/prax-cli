    <path d="M 20 30 Q 38 38 50 50"/>
    <path d="M 75 25 Q 65 40 50 50"/>
    <path d="M 82 55 Q 68 54 50 50"/>
    <path d="M 62 82 Q 58 65 50 50"/>
    <path d="M 30 75 Q 42 62 50 50"/>
