  <!-- Council voices (outer) -->
  <g fill="currentColor">
    <circle cx="20" cy="30" r="3"/>
    <circle cx="75" cy="25" r="3"/>
    <circle cx="82" cy="55" r="3"/>
    <circle cx="62" cy="82" r="3"/>
    <circle cx="30" cy="75" r="3"/>
