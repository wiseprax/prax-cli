<svg viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praxant — Praxant Wordmark (monochrome)">
  <!-- Wordmark with gap where the 'x' belongs -->
  <text x="14" y="56" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="50" font-weight="500" fill="currentColor" letter-spacing="-1">pra   ant</text>
  <!-- Custom 'x' as a node — two crossed strokes + intersection node -->
  <g transform="translate(104, 38)">
    <line x1="-13" y1="-15" x2="13" y2="15" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="13" y1="-15" x2="-13" y2="15" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="6" fill="white" stroke="currentColor" stroke-width="2.5"/>
  </g>
</svg>
