<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praxant — Container Bracket (color)">
  <!-- Corner brackets framing the inner network -->
  <g fill="none" stroke="#1A2B4A" stroke-width="3" stroke-linecap="round">
    <line x1="15" y1="15" x2="35" y2="15"/>
    <line x1="15" y1="15" x2="15" y2="35"/>
    <line x1="65" y1="85" x2="85" y2="85"/>
    <line x1="85" y1="65" x2="85" y2="85"/>
  </g>
  <!-- Inner edges connecting workers to supervisor -->
  <g fill="none" stroke="#1A2B4A" stroke-width="1.8" stroke-linecap="round" opacity="0.7">
    <path d="M 36 44 Q 42 52 50 58"/>
    <path d="M 64 44 Q 58 52 50 58"/>
  </g>
  <!-- Worker nodes -->
  <g fill="#1A2B4A">
    <circle cx="36" cy="44" r="4.5"/>
    <circle cx="64" cy="44" r="4.5"/>
  </g>
  <!-- Supervisor node (focal accent) -->
  <circle cx="50" cy="58" r="4.5" fill="#B45309"/>
</svg>
