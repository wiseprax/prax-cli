<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praxant — Node Trinity (monochrome)">
  <!-- Supervisor halo (breathing ring) -->
  <circle cx="50" cy="28" r="12" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.35"/>
  <!-- Worker → Supervisor edges (cubic Bézier, weight tapers with distance) -->
  <g fill="none" stroke="currentColor" stroke-linecap="round">
    <path d="M 24 76 C 30 60 40 44 50 28" stroke-width="2.2"/>
    <path d="M 50 82 C 50 64 50 46 50 28" stroke-width="2"/>
    <path d="M 76 76 C 70 60 60 44 50 28" stroke-width="1.8"/>
  </g>
  <!-- Worker nodes (subtle hierarchy) -->
  <g fill="currentColor">
    <circle cx="24" cy="76" r="4.8"/>
    <circle cx="50" cy="82" r="4.2"/>
    <circle cx="76" cy="76" r="4.5"/>
  </g>
  <!-- Supervisor node (focal) -->
  <circle cx="50" cy="28" r="6.5" fill="currentColor"/>
</svg>
