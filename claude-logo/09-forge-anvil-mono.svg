<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praxant — Forge Anvil (monochrome)">
  <!-- Anvil silhouette: working surface with horn, narrowing neck, planted base -->
  <g fill="currentColor">
    <!-- Top working surface with tapered horn on left -->
    <path d="M 14 42 L 18 38 L 70 38 L 75 44 L 70 48 L 18 48 L 14 42 Z"/>
    <!-- Neck (waist) -->
    <path d="M 36 48 L 64 48 L 60 60 L 40 60 Z"/>
    <!-- Base -->
    <rect x="22" y="60" width="56" height="13" rx="2"/>
  </g>
  <!-- Spark lines (radiating, dynamic) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
    <line x1="50" y1="30" x2="48" y2="22"/>
    <line x1="58" y1="28" x2="62" y2="20"/>
    <line x1="66" y1="32" x2="72" y2="26"/>
  </g>
  <!-- Spark dots -->
  <g fill="currentColor">
    <circle cx="55" cy="34" r="1.4"/>
    <circle cx="68" cy="22" r="1"/>
  </g>
</svg>
