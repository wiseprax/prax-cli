<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praxant — Praxis P-Mark (monochrome)">
  <!-- Stem (full vertical, terminating just past the pivot for grounding) -->
  <line x1="32" y1="22" x2="32" y2="80" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <!-- Bowl arc emerging from top of stem and looping back to mid-stem -->
  <path d="M 32 22 Q 66 22 66 41 Q 66 60 32 60" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pivot node (where bowl rejoins stem — focal anchor) -->
  <circle cx="32" cy="60" r="6" fill="currentColor"/>
</svg>
