<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praxant — Orbital Agents (monochrome)">
  <!-- Tilted elliptical orbits (perspective view, not atomic) -->
  <g fill="none" stroke="currentColor" stroke-width="0.9" opacity="0.4">
    <ellipse cx="50" cy="50" rx="34" ry="11" transform="rotate(20 50 50)"/>
    <ellipse cx="50" cy="50" rx="34" ry="11" transform="rotate(80 50 50)"/>
    <ellipse cx="50" cy="50" rx="34" ry="11" transform="rotate(140 50 50)"/>
  </g>
  <!-- Worker agents (positioned on the orbit ellipses) -->
  <g fill="currentColor">
    <circle cx="80" cy="38" r="3"/>
    <circle cx="20" cy="62" r="3"/>
    <circle cx="62" cy="80" r="3"/>
    <circle cx="35" cy="22" r="3"/>
  </g>
  <!-- Central orchestrator with halo (focal) -->
  <circle cx="50" cy="50" r="10" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
  <circle cx="50" cy="50" r="6" fill="currentColor"/>
</svg>
