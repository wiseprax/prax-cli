<svg viewBox="0 0 220 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praxant — Wordmark (monochrome)">
  <!-- "pra" -->
  <text x="14" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="600" fill="currentColor" letter-spacing="-1.5">pra</text>
  <!-- Custom 'x' as four edges meeting at a node (network-in-typography) -->
  <g transform="translate(98, 32)">
    <g stroke="currentColor" stroke-width="3" stroke-linecap="round">
      <line x1="-12" y1="-12" x2="-3.5" y2="-3.5"/>
      <line x1="12"  y1="-12" x2="3.5"  y2="-3.5"/>
      <line x1="-12" y1="12"  x2="-3.5" y2="3.5"/>
      <line x1="12"  y1="12"  x2="3.5"  y2="3.5"/>
    </g>
    <!-- Node at intersection (focal) -->
    <circle cx="0" cy="0" r="4.5" fill="currentColor"/>
  </g>
  <!-- "ant" -->
  <text x="116" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="600" fill="currentColor" letter-spacing="-1.5">ant</text>
</svg>
