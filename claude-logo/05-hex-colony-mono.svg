<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praxant — Hex Colony (monochrome)">
  <defs>
    <polygon id="hex" points="0,-9 7.79,-4.5 7.79,4.5 0,9 -7.79,4.5 -7.79,-4.5"/>
  </defs>
  <!-- Outer hexagons -->
  <g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round">
    <use href="#hex" transform="translate(34,42)"/>
    <use href="#hex" transform="translate(50,33)"/>
    <use href="#hex" transform="translate(66,58)"/>
    <use href="#hex" transform="translate(50,67)"/>
    <use href="#hex" transform="translate(34,58)"/>
  </g>
  <!-- Center hex (coordinator, slightly heavier) -->
  <use href="#hex" transform="translate(50,50)" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Queen hex (focal — NE position, filled) -->
  <use href="#hex" transform="translate(66,42)" fill="currentColor"/>
</svg>
